<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <title>修改日記</title>
    <style>
        body {
            background-color: #f9f1f0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 800px;
            height: 600px;
            padding: 30px;
            border-radius: 25px;
            background-color: #d6a098;
            box-sizing: border-box;
            position: relative;
        }

        .date {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-style: italic;
            margin-bottom: 10px;
        }

        #date-text {
            font-size: 18px;
            font-style: normal;
            margin-left: 20px;
        }

        input[type="date"] {
            position: absolute;
            visibility: hidden;
            pointer-events: none;
        }

        .icon {
            height: 36px;
            width: auto;
            object-fit: contain;
            cursor: pointer;
        }

        .top-row {
            display: flex;
            gap: 20px;
            height: auto;
            align-items: flex-start;
        }

        .text-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .title-line {
            display: flex;
            align-items: center;
            font-size: 18px;
            margin: 10px;
        }

        .title-line label {
            flex-shrink: 0;
            margin-right: 10px;
            font-weight: bold;
            font-size: 25px;
        }

        #diary-title {
            width: 200px;
            font-size: 16px;
            padding: 4px 6px;
            border: none;
            border-radius: 0;
            border-bottom: 2px solid transparent;
            border-image: repeating-linear-gradient(to right,
                    #000000 0,
                    #000000 16px,
                    transparent 16px,
                    transparent 35px) 1 stretch;
            background-color: transparent;
            outline: none;
        }

        #selected-mood {
            display: none;
            width: 32px;
            height: 32px;
            margin-left: 10px;
        }

        .content-line {
            display: flex;
            flex-direction: column;
            position: relative;
            margin-left: 10px;
        }

        .content-line label {
            margin-bottom: 6px;
            font-size: 18px;
            font-weight: bold;
            font-size: 25px;
        }

        #diary-content {
            margin-top: -30px;
            overflow-y: auto;
            padding-bottom: 8px;
            resize: none;
            font-size: 16px;
            border: none;
            height: calc(28px * 5);
            background-color: transparent;
            outline: none;
            line-height: 28px;
            box-sizing: border-box;
            margin-left: 80px;
            width: calc(100% - 60px);

            white-space: pre-wrap;
            word-break: break-word;

            background-image: repeating-linear-gradient(to bottom,
                    transparent 0px,
                    transparent 27px,
                    black 27px,
                    black 28px);
            background-size: 80% 28px;
            background-attachment: local;
            background-repeat: repeat-y;
            background-position: left top;
        }

        .image-box {
            width: 250px;
            height: 250px;
            flex-shrink: 0;
            border: 2px solid #a66dd7;
            border-radius: 20px;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .image-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .save-button {
            background-color: #ffc5c2;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .icon-button {
            height: 72px;
            width: auto;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .icon-button:hover {
            transform: scale(1.05);
        }

        #image-upload {
            display: none;
        }

        .mood-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .mood-content {
            background-color: #fff4bdd2;
            padding: 20px 30px;
            border-radius: 20px;
            border: 3px solid black;
            text-align: center;
        }

        .mood-grid {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 15px;
            justify-content: center;
        }

        .mood-option {
            width: 60px;
            height: 60px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .mood-option:hover {
            transform: scale(1.2);
        }

        .mood-content h3 {
            text-align: left;
            margin-top: 0;
            margin-left: 10px;
        }

        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            color: #333;
            font-weight: bold;
            z-index: 10;
            transition: transform 0.2s ease;
        }

        #close-btn:hover {
            transform: scale(1.2);
            color: #000;
        }
    </style>
</head>

<body>
    <div class="container">
        <button id="close-btn" title="關閉日記">Ｘ</button>
        <div>
            <div class="date">
                <img src="./表情/24.png" id="date-icon" alt="選擇日期" class="icon" />
                <span id="date-text"></span>
                <input type="date" id="diary-date" />
            </div>

            <div class="top-row">
                <div class="text-box">
                    <div class="title-line">
                        <label for="diary-title">標題：</label>
                        <input type="text" id="diary-title" placeholder="輸入日記標題..." />
                        <img id="selected-mood" src="" alt="心情圖示" />
                    </div>
                    <div class="content-line">
                        <label for="diary-content">內文：</label>
                        <div id="diary-content" contenteditable="true" spellcheck="false" placeholder="寫下今天的心情...">
                        </div>
                    </div>
                </div>

                <div class="image-box" id="image-box">
                    <!-- 預覽圖片會顯示在這裡 -->
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="action-buttons">
                <div class="action-item">
                    <img src="./表情/25.png" id="mood-btn" class="icon-button" alt="選擇心情" />
                </div>
                <div class="action-item">
                    <img src="./表情/26.png" id="photo-btn" class="icon-button" alt="導入圖片" />
                </div>
            </div>
            <button class="save-button" id="save-btn">儲存</button>
        </div>

        <input type="file" id="image-upload" accept="image/*" />
    </div>

    <!-- 心情選擇彈窗 -->
    <div class="mood-modal" id="mood-modal">
        <div class="mood-content">
            <h3>心情:</h3>
            <div class="mood-grid">
                <img src="./表情/16.png" class="mood-option" alt="開心" />
                <img src="./表情/17.png" class="mood-option" alt="平凡" />
                <img src="./表情/18.png" class="mood-option" alt="驚訝" />
                <img src="./表情/19.png" class="mood-option" alt="害羞" />
                <img src="./表情/20.png" class="mood-option" alt="生氣" />
                <img src="./表情/21.png" class="mood-option" alt="嘻嘻" />
                <img src="./表情/22.png" class="mood-option" alt="難過" />
                <img src="./表情/23.png" class="mood-option" alt="吃吃" />
            </div>
        </div>
    </div>


    <script>
        // DOM元素
        const imageInput = document.getElementById('image-upload');
        const imageBox = document.getElementById('image-box');
        const photoBtn = document.getElementById('photo-btn');
        const dateIcon = document.getElementById('date-icon');
        const diaryDate = document.getElementById('diary-date');
        const dateText = document.getElementById('date-text');
        const moodBtn = document.getElementById('mood-btn');
        const moodModal = document.getElementById('mood-modal');
        const moodOptions = document.querySelectorAll('.mood-option');
        const selectedMood = document.getElementById('selected-mood');
        const saveBtn = document.getElementById('save-btn');
        const diaryTitle = document.getElementById('diary-title');
        const diaryContent = document.getElementById('diary-content');

        // 目前日記資料物件
        let currentDiary = {
            date: '',
            title: '',
            content: '',
            mood: '',
            image: ''
        };

        // 預設載入今天日期
        function setTodayDate() {
            const today = new Date().toISOString().split('T')[0];
            diaryDate.value = today;
            dateText.textContent = today;
            currentDiary.date = today;
        }
        setTodayDate();

        // 載入日記內容
        function loadDiaryForDate(date) {
            const diaries = JSON.parse(localStorage.getItem('diaries') || '[]');
            const entry = diaries.find(d => d.date === date);
            if (entry) {
                currentDiary = { ...entry };
                diaryTitle.value = entry.title || "";
                diaryContent.innerText = entry.content || "";
                if (entry.mood) {
                    selectedMood.src = entry.mood;
                    selectedMood.style.display = 'inline-block';
                    selectedMood.alt = "心情圖示";
                } else {
                    selectedMood.style.display = 'none';
                    selectedMood.src = "";
                }
                if (entry.image) {
                    imageBox.innerHTML = `<img src="${entry.image}" alt="預覽圖片" />`;
                } else {
                    imageBox.innerHTML = '';
                }
            } else {
                // 沒有日記則清空
                currentDiary = { date: date, title: '', content: '', mood: '', image: '' };
                diaryTitle.value = "";
                diaryContent.innerText = "";
                selectedMood.style.display = 'none';
                selectedMood.src = "";
                imageBox.innerHTML = '';
            }
        }

        diaryDate.addEventListener('change', () => {
            const selected = diaryDate.value;
            dateText.textContent = selected;
            currentDiary.date = selected;
            loadDiaryForDate(selected);   // <-- 這裡載入選中日期的日記資料
        });

        // 心情選擇按鈕開啟modal
        moodBtn.addEventListener('click', () => {
            moodModal.style.display = 'flex';
        });

        // 心情選擇後更新心情圖片
        moodOptions.forEach(option => {
            option.addEventListener('click', () => {
                moodModal.style.display = 'none';
                selectedMood.src = option.src;
                selectedMood.style.display = 'inline-block';
                selectedMood.alt = option.alt || '心情圖示';
                currentDiary.mood = option.src;
            });
        });

        // 點擊空白區域關閉心情modal
        moodModal.addEventListener('click', e => {
            if (e.target === moodModal) {
                moodModal.style.display = 'none';
            }
        });

        // 圖片導入按鈕
        photoBtn.addEventListener('click', () => {
            imageInput.click();
        });

        // 圖片選擇預覽
        imageInput.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    imageBox.innerHTML = `<img src="${e.target.result}" alt="預覽圖片" />`;
                    currentDiary.image = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // 儲存按鈕點擊事件
        saveBtn.addEventListener('click', () => {
            currentDiary.title = diaryTitle.value.trim();
            currentDiary.content = diaryContent.innerText.trim();

            if (!currentDiary.date) {
                alert('請選擇日期');
                return;
            }

            let diaries = JSON.parse(localStorage.getItem('diaries') || '[]');

            // 找是否已有同日期日記
            const existingIndex = diaries.findIndex(d => d.date === currentDiary.date);

            if (existingIndex !== -1) {
                diaries[existingIndex] = currentDiary;
            } else {
                diaries.push(currentDiary);
            }

            localStorage.setItem('diaries', JSON.stringify(diaries));

            alert('儲存成功！');

            // 儲存後導回主頁 (假設主頁是 index.html)
            window.location.href = 'main.html';
        });

        function getQueryParam(param) {
            const params = new URLSearchParams(window.location.search);
            return params.get(param);
        }

        // 頁面載入時載入日記
        window.onload = () => {
            const urlDate = getQueryParam('date');
            if (urlDate) {
                diaryDate.value = urlDate;
                dateText.textContent = urlDate;
                loadDiaryForDate(urlDate);
            } else {
                loadDiaryForDate(diaryDate.value);
            }
        };

        document.getElementById('close-btn').addEventListener('click', () => {
            window.location.href = 'main.html';
        });
    </script>
</body>

</html>
