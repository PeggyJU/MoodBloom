<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>即時心情版</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      body {
        background-color: #f9f1f0;
        margin: 0;
        font-family: Cambria, Cochin, Georgia, Times, "Times New Roman", serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 50px;
      }

      h1 {
        font-style: italic;
        font-size: 35px;
        margin: 0;
      }

      .icon {
        display: flex;
        gap: 10px;
      }

      .balloonBtn,
      .calendarBtn,
      .previousBtn,
      .nextBtn,
      .addBtn {
        border: none;
        background-color: transparent;
        cursor: pointer;
        padding: 0;
      }

      .icon img {
        width: 80px;
        height: auto;
        display: block;
      }

      .board-container {
        border: 2px solid #0a0147;
        border-radius: 20px;
        margin: 20px 70px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        position: relative;
        min-height: 300px;
      }

      .previousBtn {
        position: absolute;
        top: 50%;
        left: -50px;
        transform: translateY(-50%);
      }

      .nextBtn {
        position: absolute;
        top: 50%;
        right: -50px;
        transform: translateY(-50%);
      }

      .addBtn {
        position: absolute;
        bottom: -50px;
        left: 50%;
        transform: translateX(-50%);
      }

      .cards-wrapper {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        transition: transform 0.5s ease;
        transform-style: preserve-3d;
        max-width: 1100px;
      }

      .cards-wrapper.flip-anim {
        animation: pageFlip 0.5s ease;
      }

      @keyframes pageFlip {
        0% {
          transform: rotateY(90deg);
          opacity: 0;
        }

        100% {
          transform: rotateY(0deg);
          opacity: 1;
        }
      }

      .card {
        width: 317px;
        height: 190px;
        perspective: 1000px;
        margin: 40px 20px 60px 20px;
        box-sizing: border-box;
      }

      .card-inner {
        width: 100%;
        height: 100%;
        position: relative;
        transition: transform 0.6s;
        transform-style: preserve-3d;
      }

      /* 只讓 .flippable 的卡片有翻轉效果 */
      .flippable.flipped .card-inner {
        transform: rotateY(180deg);
      }

      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 20px;
        display: flex;
        background-color: #e4beb8;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.15);
        box-sizing: border-box;
      }

      .card-front {
        padding: 30px;
        justify-content: flex-start;
        align-items: center;
        gap: 20px;
      }

      .card-back {
        transform: rotateY(180deg);
        justify-content: flex-start;
        align-items: center;
        font-size: 15px;
        text-align: left;
        padding: 30px;
        flex-direction: row;
        gap: 30px;
      }

      .card-date {
        display: flex;
        flex-direction: column;
        font-weight: bold;
        font-size: 28px;
        color: #3c2a2a;
        width: 60px;
        justify-content: center;
        align-items: center;
      }

      .card-date span {
        line-height: 2;
      }

      .card-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 15px;
        text-align: center;
      }

      .card-content {
        flex: 1;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 15px;
        text-align: center;
      }

      .card-title {
        font-weight: bold;
        font-size: 25px;
      }

      .card-img {
        width: 150px;
        height: 150px;
        border-radius: 10px;
        object-fit: contain;
      }

      .card-mood {
        width: 30px;
        height: auto;
      }

      .empty-card-text {
        font-weight: bold;
        color: #aaa;
      }

      .quote {
        font-size: 0.9em;
        font-style: italic;
        color: #555;
        margin-top: 5px;
      }

      .button-click-animation {
        transform: scale(0.9);
        transition: transform 0.1s ease;
      }

      .button-click-reset {
        transform: scale(1);
        transition: transform 0.1s ease;
      }
    </style>
  </head>

  <body>
    <header>
      <h1 id="date"></h1>
      <div class="icon">
        <button class="balloonBtn">
          <img src="./icon/氣球icon.png" alt="氣球" />
        </button>
        <button class="calendarBtn">
          <img src="./icon/日曆icon.png" alt="日曆" />
        </button>
      </div>
    </header>

    <div class="board-container">
      <button class="previousBtn">
        <img src="./icon/上一頁.png" alt="上一頁" />
      </button>
      <button class="nextBtn">
        <img src="./icon/下一頁.png" alt="下一頁" />
      </button>
      <button class="addBtn">
        <img src="./icon/新增.png" alt="新增" />
      </button>

      <div class="cards-wrapper">
        <!-- 預設 6 張卡片 -->
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        const today = new Date();
        const options = { year: "numeric", month: "short", day: "numeric" };
        const formattedDate = today
          .toLocaleDateString("en-US", options)
          .toLocaleUpperCase();
        $("#date").text(formattedDate);

        $(document).on("mouseenter", ".flippable", function () {
          $(this).addClass("flipped");
        });
        $(document).on("mouseleave", ".flippable", function () {
          $(this).removeClass("flipped");
        });

        $(".balloonBtn").click(function () {
          window.location.href = "balloon.html";
        });

        $(".calendarBtn").click(function () {
          window.location.href = "calendar.html";
        });

        $(".addBtn").click(function () {
          window.location.href = "add.html";
        });

        const cardsPerPage = 6;
        let storedDiaries = JSON.parse(localStorage.getItem("diaries") || "[]");

        let diaryMap = {};
        storedDiaries.forEach((entry) => {
          diaryMap[entry.date] = entry.image || null;
        });

        function generateLastNDates(n) {
          const dates = [];
          const today = new Date();
          for (let i = 0; i < n; i++) {
            const d = new Date(today);
            d.setDate(d.getDate() - i);
            const key =
              d.getFullYear() +
              "-" +
              String(d.getMonth() + 1).padStart(2, "0") +
              "-" +
              String(d.getDate()).padStart(2, "0");
            dates.push({
              fullDate: key,
              displayDate: `${d.getMonth() + 1}/${d.getDate()}`,
              img: diaryMap[key] || null,
            });
          }
          return dates;
        }

        let data = generateLastNDates(30).reverse();
        const totalPages = Math.ceil(data.length / cardsPerPage);
        let currentPage = totalPages - 1;

        function renderCards() {
          const wrapper = $(".cards-wrapper");
          wrapper.removeClass("flip-anim");

          setTimeout(() => {
            wrapper.addClass("flip-anim");
          }, 10);
          const start = currentPage * cardsPerPage;
          const end = start + cardsPerPage;
          const pageData = data.slice(start, end);

          const cards = $(".card");
          cards.each(function (index) {
            const card = $(this).removeClass(
              "flippable flipped book-flip-anim"
            ); // 清除舊狀態

            if (index < pageData.length) {
              const item = pageData[index];
              let dateParts = item.displayDate.split("/");
              let dateSpans = `<span>${dateParts[0]}</span><span>/</span><span>${dateParts[1]}</span>`;

              const diary = storedDiaries.find((d) => d.date === item.fullDate);

              if (
                diary &&
                (diary.title || diary.content || diary.mood || diary.image)
              ) {
                let moodImg = diary.mood
                  ? `<img class="card-mood" src="${diary.mood}" />`
                  : "";
                let mainImg = diary.image
                  ? `<img class="card-img" src="${diary.image}" />`
                  : "";
                let title = diary.title || "";
                let content = diary.content || "";
                if (content.length > 15) {
                  content = content.slice(0, 15) + "...";
                }
                
                let quote = diary.quote
                  ? `<p class="quote">"${diary.quote}"</p>`
                  : "";

                let contentHtml = `
                                <div class="card-inner">
                                    <div class="card-front">
                                        <div class="card-date">${dateSpans}</div>
                                        <div class="card-info">
                                            <div class="card-content">
                                                <div class="card-title">${title}</div>
                                                ${moodImg}
                                            </div>
                                            ${quote}
                                        </div>
                                    </div>
                                    <div class="card-back">
                                        <p>${content}</p>
                                        ${mainImg}
                                    </div>
                                </div>`;

                card.html(contentHtml);
                card.addClass("flippable book-flip-anim");
                card.css("cursor", "pointer");
                card.off("click").on("click", function () {
                  window.location.href = `edit.html?date=${item.fullDate}`;
                });

                // 移除動畫 class 以便下次翻頁可以重播
                setTimeout(() => {
                  card.removeClass("book-flip-anim");
                }, 500);
              } else if (diary && diary.quote) {
                // 只有 quote 的卡片（不可編輯）
                let quote = `<p class="quote">"${diary.quote}"</p>`;
                let contentHtml = `
                                <div class="card-inner">
                                    <div class="card-front">
                                        <div class="card-date">${dateSpans}</div>
                                        <div class="card-info">
                                            ${quote}
                                        </div>
                                    </div>
                                </div>`;
                card.html(contentHtml);
                card.css("cursor", "default");
                card.off("click");
              } else {
                // 完全空白卡
                card.html(
                  `<div class="card-inner"><div class="card-front"><div class="card-date">${dateSpans}</div><p class="empty-card-text"></p></div></div>`
                );
                card.css("cursor", "default");
                card.off("click");
              }
            } else {
              card.html(
                `<div class="card-inner"><div class="card-front"><p class="empty-card-text">—</p></div></div>`
              );
              card.css("cursor", "default");
              card.off("click");
            }
          });
        }

        $(".previousBtn").click(function () {
          if (currentPage > 0) {
            currentPage--;

            // 換 icon（可依需求加延遲或動畫）
            $(".previousBtn img").attr("src", "./icon/上一頁_按下.png");

            // 你可以設定一小段時間後換回原圖
            setTimeout(() => {
              $(".previousBtn img").attr("src", "./icon/上一頁.png");
            }, 200);

            renderCards();
          }
        });

        $(".nextBtn").click(function () {
          if (currentPage < totalPages - 1) {
            currentPage++;

            $(".nextBtn img").attr("src", "./icon/下一頁_按下.png");
            setTimeout(() => {
              $(".nextBtn img").attr("src", "./icon/下一頁.png");
            }, 200);

            renderCards();
          }
        });

        renderCards();
      });
    </script>
  </body>
</html>
